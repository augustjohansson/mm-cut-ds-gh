name: Build Docker Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docker/Dockerfile'
      - '.github/workflows/docker-build.yml'
      - 'test/test_dolfin.sh'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'docker/Dockerfile'
      - '.github/workflows/docker-build.yml'
      - 'test/test_dolfin.sh'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image (load locally for testing)
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run test/test_dolfin.sh in Docker container
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          docker run --rm \
            -v "${{ github.workspace }}/test:/opt/test:ro" \
            "$IMAGE_TAG" \
            bash /opt/test/test_dolfin.sh

      - name: Push Docker image to registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            docker push "$tag"
          done
